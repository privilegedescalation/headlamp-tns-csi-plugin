name: Promotion Gate

# dev PRs: no gate (engineer self-merges).
# uat PRs: QA approval required.
# main PRs: UAT approval required (uat→main promotions).

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    branches: [uat, main]
    types: [opened, reopened, synchronize]

jobs:
  promotion-gate:
    name: Promotion Gate
    runs-on: ubuntu-latest
    container: ubuntu:latest
    timeout-minutes: 5

    steps:
      - name: Install dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends ca-certificates curl jq

      - name: Check promotion approval
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ -z "${HEAD_REF}" ] || [ "${HEAD_REF}" = "null" ]; then
            echo "::notice::No head branch in context. Skipping promotion gate."
            exit 0
          fi

          echo "Checking promotion gate for head=${HEAD_REF} → base=${BASE_REF} in ${REPO}"

          # Resolve the Gitea PR by head+base branch — do NOT key off the GitHub PR number.
          # GitHub and Gitea PR numbering have diverged; using the number hits the wrong Gitea PR.
          ALL_GITEA_PRS=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "https://git.farh.net/api/v1/repos/${REPO}/pulls?state=open&limit=50&page=1")

          if [ -z "${ALL_GITEA_PRS}" ] || [ "${ALL_GITEA_PRS}" = "null" ]; then
            echo "::error::Could not fetch open Gitea PRs for ${REPO}. Gate fails closed."
            exit 1
          fi

          GITEA_PR_NUMBER=$(printf '%s' "${ALL_GITEA_PRS}" | jq -r \
            --arg head "${HEAD_REF}" --arg base "${BASE_REF}" \
            '[.[] | select(.head.ref == $head and .base.ref == $base)] | if length == 1 then .[0].number | tostring else "" end')

          if [ -z "${GITEA_PR_NUMBER}" ]; then
            echo "::error::No unique open Gitea PR found with head=${HEAD_REF} and base=${BASE_REF}. Gate fails closed."
            exit 1
          fi

          echo "Resolved Gitea PR #${GITEA_PR_NUMBER} (head=${HEAD_REF} → base=${BASE_REF})"

          # Determine required reviewer based on target branch
          case "${BASE_REF}" in
            dev)
              echo "Target is dev — no review required. Engineers self-merge."
              exit 0
              ;;
            uat)
              REQUIRED_REVIEWER="pe_regina"
              GATE_NAME="QA"
              ;;
            main)
              # For plugin repos (Pipeline A), UAT approval is needed for uat→main
              if [ "${HEAD_REF}" = "uat" ]; then
                REQUIRED_REVIEWER="pe_patty"
                GATE_NAME="UAT"
              else
                REQUIRED_REVIEWER="pe_regina"
                GATE_NAME="QA"
              fi
              ;;
            *)
              echo "::notice::Target branch '${BASE_REF}' has no promotion gate configured."
              exit 0
              ;;
          esac

          echo "Required reviewer: ${REQUIRED_REVIEWER} (${GATE_NAME})"

          # For uat→main promotions, pe_patty may not be able to review (bot account).
          # Accept pe_nancy (CTO) as a valid alternative reviewer.
          ALT_REVIEWER=""
          if [ "${REQUIRED_REVIEWER}" = "pe_patty" ]; then
            ALT_REVIEWER="pe_nancy"
          fi

          REVIEWS=$(curl -sf \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Accept: application/json" \
            "https://git.farh.net/api/v1/repos/${REPO}/pulls/${GITEA_PR_NUMBER}/reviews")

          if [ -z "${REVIEWS}" ] || [ "${REVIEWS}" = "null" ]; then
            echo "::warning::Could not fetch reviews for Gitea PR #${GITEA_PR_NUMBER}."
            exit 1
          fi

          REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${REQUIRED_REVIEWER}" \
            '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')

          echo "${GATE_NAME} (${REQUIRED_REVIEWER}) approved: ${REVIEWER_APPROVED}"

          # Fallback: check if CTO approved as alternative for uat→main
          if [ "${REVIEWER_APPROVED}" != "true" ] && [ -n "${ALT_REVIEWER}" ]; then
            REVIEWER_APPROVED=$(printf '%s' "${REVIEWS}" | jq -r --arg user "${ALT_REVIEWER}" \
              '[.[] | select(.user.login == $user)] | last | if .state then .state == "APPROVED" else false end')
            if [ "${REVIEWER_APPROVED}" = "true" ]; then
              echo "CTO (${ALT_REVIEWER}) approved as fallback for UAT gate."
            fi
          fi

          if [ "${REVIEWER_APPROVED}" = "true" ]; then
            echo "Promotion gate passed: ${GATE_NAME} has approved."
          else
            echo "Promotion gate failed: waiting for ${GATE_NAME} approval from ${REQUIRED_REVIEWER}."
            exit 1
          fi
