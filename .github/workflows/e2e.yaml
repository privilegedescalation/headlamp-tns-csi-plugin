name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.repository }}
  cancel-in-progress: false

jobs:
  e2e:
    uses: privilegedescalation/.github/.github/workflows/plugin-e2e.yaml@main
    with:
      node-version: '22'
      headlamp-version: v0.40.1
      e2e-namespace: headlamp-dev
